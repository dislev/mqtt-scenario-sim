name: Stale

on:
  schedule:
    - cron: '0 0 * * 1'

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: 'This issue has been inactive for 60 days. It will be closed in 7 days unless there is new activity.'
          stale-pr-message: 'This PR has been inactive for 60 days. It will be closed in 7 days unless there is new activity.'
          close-issue-message: 'Closing due to inactivity. Feel free to reopen if this is still relevant.'
          close-pr-message: 'Closing due to inactivity. Feel free to reopen if this is still relevant.'
          days-before-stale: 60
          days-before-close: 7
          exempt-issue-labels: 'pinned,security'
          exempt-pr-labels: 'pinned'
